<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USSH HCM - Quản lý Ca CTXH</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom CSS -->
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInSlideUp 0.3s ease-out forwards; }
        ::selection { background-color: #bfdbfe; color: #1e3a8a; }
    </style>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (Biên dịch JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Mammoth.js (Thư viện đọc file .docx) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-hidden">
    
    <div id="root">
        <!-- Hiệu ứng tải trang -->
        <div class="flex flex-col items-center justify-center h-screen bg-slate-50">
            <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
            <p class="mt-4 text-slate-500 font-medium">Đang khởi tạo hệ thống...</p>
        </div>
    </div>

    <script type="text/babel">
        // 1. ERROR BOUNDARY
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, errorInfo: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, errorInfo: error.toString() }; }
            componentDidCatch(error, errorInfo) { console.error("Lỗi React nội bộ:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-10 bg-red-50 text-red-800 h-screen font-mono flex flex-col items-center justify-center">
                            <h2 className="text-3xl font-black mb-4 text-red-600">⚠️ Hệ Thống Gặp Sự Cố</h2>
                            <p className="bg-white p-6 border border-red-200 rounded-xl shadow-lg max-w-2xl w-full">{this.state.errorInfo}</p>
                            <button onClick={() => window.location.reload()} className="mt-6 px-6 py-3 bg-red-600 text-white font-bold rounded-xl shadow-md">Tải lại trang</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const { useState, useRef, useEffect } = React;
        
        // 2. ICONS (Sử dụng Emoji/Text để chống lỗi thư viện bên ngoài)
        const TextIcon = ({ symbol, className, size }) => (
            <span className={`inline-flex items-center justify-center ${className || ''}`} style={{ fontSize: size ? `${size}px` : 'inherit', lineHeight: 1 }}>
                {symbol}
            </span>
        );

        const LayoutDashboard = (p) => <TextIcon symbol="📊" {...p} />;
        const Users = (p) => <TextIcon symbol="👥" {...p} />;
        const FileText = (p) => <TextIcon symbol="📝" {...p} />;
        const AlertTriangle = (p) => <TextIcon symbol="⚠️" {...p} />;
        const Search = (p) => <TextIcon symbol="🔍" {...p} />;
        const PlusCircle = (p) => <TextIcon symbol="➕" {...p} />;
        const CheckCircle = (p) => <TextIcon symbol="✅" {...p} />;
        const Clock = (p) => <TextIcon symbol="⏱️" {...p} />;
        const Sparkles = (p) => <TextIcon symbol="✨" {...p} />;
        const Loader2 = ({className, ...p}) => <TextIcon symbol="⏳" className={className} {...p} />;
        const Bot = (p) => <TextIcon symbol="🤖" {...p} />;
        const FileInput = (p) => <TextIcon symbol="📁" {...p} />;
        const Save = (p) => <TextIcon symbol="💾" {...p} />;
        const X = (p) => <TextIcon symbol="❌" {...p} />;
        const UserCircle = (p) => <TextIcon symbol="👤" {...p} />;
        const FolderOpen = (p) => <TextIcon symbol="📂" {...p} />;
        const ShieldAlert = (p) => <TextIcon symbol="🛡️" {...p} />;
        const Target = (p) => <TextIcon symbol="🎯" {...p} />;
        const Network = (p) => <TextIcon symbol="🔗" {...p} />;
        const TrendingUp = (p) => <TextIcon symbol="📈" {...p} />;
        const ChevronLeft = (p) => <TextIcon symbol="⬅️" {...p} />;
        const ArrowRight = (p) => <TextIcon symbol="➡️" {...p} />;
        const Activity = (p) => <TextIcon symbol="🏥" {...p} />;
        const HeartHandshake = (p) => <TextIcon symbol="🤝" {...p} />;
        const BriefcaseMedical = (p) => <TextIcon symbol="💼" {...p} />;
        const GraduationCap = (p) => <TextIcon symbol="🎓" {...p} />;
        const Scale = (p) => <TextIcon symbol="⚖️" {...p} />;
        const FileSignature = (p) => <TextIcon symbol="✍️" {...p} />;
        const UploadCloud = (p) => <TextIcon symbol="☁️" {...p} />;
        const FileType = (p) => <TextIcon symbol="📄" {...p} />;
        const Building = (p) => <TextIcon symbol="🏢" {...p} />;
        const Trash2 = (p) => <TextIcon symbol="🗑️" {...p} />;
        const Info = (p) => <TextIcon symbol="ℹ️" {...p} />;
        const Edit3 = (p) => <TextIcon symbol="✏️" {...p} />;
        const CalendarClock = (p) => <TextIcon symbol="📅" {...p} />;
        const Timer = (p) => <TextIcon symbol="⏲️" {...p} />;
        const ListTodo = (p) => <TextIcon symbol="📋" {...p} />;
        const BellRing = (p) => <TextIcon symbol="🔔" {...p} />;
        const BarChart3 = (p) => <TextIcon symbol="📊" {...p} />;
        const SlidersHorizontal = (p) => <TextIcon symbol="🎛️" {...p} />;
        const TrendingDown = (p) => <TextIcon symbol="📉" {...p} />;
        const RotateCcw = (p) => <TextIcon symbol="🔄" {...p} />;
        const Camera = (p) => <TextIcon symbol="📷" {...p} />;
        const ArrowUp = (p) => <TextIcon symbol="⬆️" {...p} />;
        const ArrowDown = (p) => <TextIcon symbol="⬇️" {...p} />;

        // 3. HELPERS
        const today = new Date();
        const addDays = (days) => new Date(today.getTime() + days * 24 * 60 * 60 * 1000).toLocaleDateString('vi-VN');
        
        // Cắt ISO String để lấy YYYY-MM-DD cho thẻ <input type="date">
        const getTodayYMD = () => new Date().toISOString().split('T')[0];
        
        const formatDateToVN = (dateStr) => {
          if (!dateStr) return '';
          if (dateStr.includes('-')) {
             const [year, month, day] = dateStr.split('-');
             return `${day}/${month}/${year}`;
          }
          return dateStr;
        };
        const parseDateStr = (dateStr) => {
          if (!dateStr) return new Date();
          const parts = dateStr.split('/');
          if (parts.length !== 3) return new Date();
          return new Date(`${parts[2]}-${parts[1]}-${parts[0]}T00:00:00`);
        };
        
        // HÀM TẠO BÍ DANH ẨN DANH (Nguyễn Văn A -> N.V.A)
        const getAliasFromName = (fullName) => {
            if (!fullName) return '';
            return fullName.trim().split(/\s+/).map(word => word.charAt(0).toUpperCase() + '.').join('');
        };

        // 4. MINI LINE CHART
        const MiniLineChart = ({ kpiData }) => {
          if (!kpiData || !kpiData.history || kpiData.history.length === 0) return null;
          const { history, target } = kpiData;
          const values = history.map(d => d.value);
          const maxVal = Math.max(...values, target);
          const minVal = Math.min(...values, target, 0);
          const range = maxVal - minVal || 1;

          const width = 600, height = 180, paddingX = 40, paddingY = 30;
          const getX = (index) => paddingX + (index * (width - 2 * paddingX) / Math.max(1, history.length - 1));
          const getY = (val) => height - paddingY - ((val - minVal) / range) * (height - 2 * paddingY);

          const points = history.map((d, i) => `${getX(i)},${getY(d.value)}`).join(' ');
          const targetY = getY(target);

          return (
            <div className="w-full overflow-x-auto pb-4">
              <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full min-w-[400px] overflow-visible drop-shadow-sm">
                <line x1={paddingX} y1={getY(maxVal)} x2={width - paddingX} y2={getY(maxVal)} stroke="#f1f5f9" strokeWidth="1" />
                <line x1={paddingX} y1={getY((maxVal + minVal)/2)} x2={width - paddingX} y2={getY((maxVal + minVal)/2)} stroke="#f1f5f9" strokeWidth="1" />
                <line x1={paddingX} y1={getY(minVal)} x2={width - paddingX} y2={getY(minVal)} stroke="#e2e8f0" strokeWidth="2" />
                <line x1={paddingX} y1={targetY} x2={width - paddingX} y2={targetY} stroke="#10b981" strokeWidth="2" strokeDasharray="5,5" />
                <text x={width - paddingX + 5} y={targetY + 4} fill="#10b981" fontSize="12" fontWeight="bold">Đích: {target}</text>
                {history.length > 1 && <polyline points={points} fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />}
                {history.map((d, i) => (
                  <g key={i}>
                    <circle cx={getX(i)} cy={getY(d.value)} r="5" fill="#ffffff" stroke="#3b82f6" strokeWidth="2" className="hover:fill-blue-100 transition-all cursor-pointer"><title>Ngày chấm: {d.date}&#10;Chỉ số: {d.value}</title></circle>
                    <text x={getX(i)} y={getY(d.value) - 12} fill="#1e293b" fontSize="12" fontWeight="bold" textAnchor="middle">{d.value}</text>
                    <text x={getX(i)} y={height - 10} fill="#64748b" fontSize="10" textAnchor="middle">{d.date.substring(0,5)}</text>
                  </g>
                ))}
              </svg>
            </div>
          );
        };

        // 5. MOCK DATA TRỐNG
        const initialClients = [];

        // 6. MAIN COMPONENT
        function CaseManagementDemo() {
          const [activeTab, setActiveTab] = useState('dashboard');
          
          // LƯU TRỮ LOCAL STORAGE
          const [clients, setClients] = useState(() => {
            const saved = localStorage.getItem('ussh_hcm_clients_data');
            if (saved) {
                try { return JSON.parse(saved); } 
                catch(e) { return initialClients; }
            }
            return initialClients;
          });

          useEffect(() => {
              localStorage.setItem('ussh_hcm_clients_data', JSON.stringify(clients));
          }, [clients]);

          const [modalConfig, setModalConfig] = useState({ isOpen: false, title: '', message: '', type: 'info', onConfirm: null, onCancel: null });
          const [clientFilter, setClientFilter] = useState('active'); 
          const [searchQuery, setSearchQuery] = useState(''); // Thêm state cho thanh tìm kiếm

          const [selectedClient, setSelectedClient] = useState(null);
          const [detailSubTab, setDetailSubTab] = useState('info'); 
          
          const [isEditingInfo, setIsEditingInfo] = useState(false);
          const [editInfoData, setEditInfoData] = useState({});
          
          // SWOT & VẤN ĐỀ
          const [isEditingAssessment, setIsEditingAssessment] = useState(false);
          const [editAssessmentData, setEditAssessmentData] = useState({ S: '', W: '', O: '', T: '', problems: [] });
          const [newEditProblemText, setNewEditProblemText] = useState('');

          const [showAddGoalForm, setShowAddGoalForm] = useState(false);
          const [newGoalData, setNewGoalData] = useState({ text: '', deadline: '', baseline: 0, target: 10, unit: 'Điểm', activity: '' });
          const [updatingGoalId, setUpdatingGoalId] = useState(null); 
          const [editingGoalId, setEditingGoalId] = useState(null); 
          const [editGoalData, setEditGoalData] = useState({});
          const [tempKpiValue, setTempKpiValue] = useState(0);
          const [tempKpiDate, setTempKpiDate] = useState(''); 

          const [showAddReferralForm, setShowAddReferralForm] = useState(false);
          const [newRefOrg, setNewRefOrg] = useState('');
          const [newRefService, setNewRefService] = useState('');
          const [newRefCondition, setNewRefCondition] = useState(''); 
          const [newRefStatus, setNewRefStatus] = useState('Đã kết nối');

          const [isEditingEvalNote, setIsEditingEvalNote] = useState(false);
          const [evalNoteData, setEvalNoteData] = useState('');

          // Thêm Khuyết tật, Ngày ghi nhận, Vấn đề vào Khởi tạo
          const [newClient, setNewClient] = useState({ fullName: '', studentId: '', recordDate: getTodayYMD(), disabilityStatus: '', age: '', ethnicity: '', religion: '', category: '', phone: '', address: '', interventionLevel: 'Phòng ngừa/Theo dõi', family: '', history: '', needs: '', problems: [], swot_S: '', swot_W: '', swot_O: '', swot_T: '', avatar: '', notes: '' });
          const [newProblemText, setNewProblemText] = useState('');
          
          const [rawNotes, setRawNotes] = useState('');
          const [isExtractingInfo, setIsExtractingInfo] = useState(false);
          const [extractError, setExtractError] = useState('');
          const fileInputRef = useRef(null);

          const showAlert = (title, message, type = 'info') => setModalConfig({ isOpen: true, title, message, type, onConfirm: () => setModalConfig(prev => ({...prev, isOpen: false})), onCancel: null });
          const showConfirm = (title, message, onConfirmAction) => setModalConfig({ isOpen: true, title, message, type: 'confirm', onConfirm: () => { onConfirmAction(); setModalConfig(prev => ({...prev, isOpen: false})); }, onCancel: () => setModalConfig(prev => ({...prev, isOpen: false})) });

          const handleAvatarUpload = (e, stateSetter, currentState) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => { stateSetter({ ...currentState, avatar: event.target.result }); };
            reader.readAsDataURL(file);
          };

          // HÀM HỖ TRỢ DI CHUYỂN ITEM TRONG MẢNG (SẮP XẾP ƯU TIÊN VẤN ĐỀ)
          const moveArrayItem = (arr, index, direction) => {
              const newArr = [...arr];
              if (direction === 'up' && index > 0) {
                  [newArr[index - 1], newArr[index]] = [newArr[index], newArr[index - 1]];
              } else if (direction === 'down' && index < newArr.length - 1) {
                  [newArr[index + 1], newArr[index]] = [newArr[index], newArr[index + 1]];
              }
              return newArr;
          };

          const getGoalWarning = (deadlineStr, status) => {
            if (status === 'Hoàn thành' || !deadlineStr) return null;
            const dDate = parseDateStr(deadlineStr);
            const currentDate = new Date();
            dDate.setHours(0,0,0,0); currentDate.setHours(0,0,0,0);
            const diffDays = Math.ceil((dDate - currentDate) / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return { text: `Quá hạn ${Math.abs(diffDays)} ngày`, color: 'text-red-600', bg: 'bg-red-100', border: 'border-red-200' };
            if (diffDays === 0) return { text: `Hết hạn hôm nay`, color: 'text-amber-600', bg: 'bg-amber-100', border: 'border-amber-200' };
            if (diffDays <= 7) return { text: `Còn ${diffDays} ngày`, color: 'text-amber-600', bg: 'bg-amber-100', border: 'border-amber-200' };
            return null;
          };
          
          const systemWarnings = clients.flatMap(c => c.status !== 'Đã đóng ca' ? (c.details?.goals || []).map(g => ({ client: c, goal: g, warn: getGoalWarning(g.deadline, g.status) })).filter(w => w.warn) : []);

          const getInterventionBadge = (level) => {
            switch(level) {
                case 'Can thiệp Khẩn cấp': return <span className="px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold flex items-center gap-1 w-max">🔴 Khẩn cấp</span>;
                case 'Can thiệp Chuyên sâu': return <span className="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-xs font-bold flex items-center gap-1 w-max">🟣 Chuyên sâu</span>;
                case 'Hỗ trợ Cơ bản': return <span className="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold flex items-center gap-1 w-max">🔵 Cơ bản</span>;
                case 'Phòng ngừa/Theo dõi': return <span className="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold flex items-center gap-1 w-max">🟢 Phòng ngừa</span>;
                default: return <span className="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-xs font-bold flex items-center gap-1 w-max">{level || 'Chưa phân loại'}</span>;
            }
          };

          const updateClientInState = (updated) => { setClients(clients.map(c => c.id === updated.id ? updated : c)); setSelectedClient(updated); };
          const navToClientDetail = (client, tab = 'info') => { setSelectedClient(client); setActiveTab('clientDetail'); setDetailSubTab(tab); setIsEditingInfo(false); setIsEditingAssessment(false); setShowAddGoalForm(false); setEditingGoalId(null); setIsEditingEvalNote(false); };
          
          const handleDeleteClient = (id) => showConfirm('CẢNH BÁO BẢO MẬT', `Xóa vĩnh viễn hồ sơ [${id}]? Hành động không thể hoàn tác.`, () => { setClients(clients.filter(c => c.id !== id)); if (selectedClient?.id === id) { setSelectedClient(null); setActiveTab('clients'); } showAlert('Thành công', `Đã xóa hồ sơ [${id}].`, 'success'); });
          
          const handleResetAllData = () => {
             showConfirm('CẢNH BÁO BẢO MẬT', 'Hành động này sẽ XÓA TOÀN BỘ HỒ SƠ khỏi hệ thống. Bạn có chắc chắn muốn làm mới bộ nhớ?', () => {
                 localStorage.removeItem('ussh_hcm_clients_data');
                 setClients([]);
                 setSelectedClient(null);
                 setActiveTab('dashboard');
                 showAlert('Thành công', 'Đã xóa toàn bộ dữ liệu trên thiết bị này.', 'success');
             });
          };

          // --- INFO EDIT LOGIC ---
          const startEditingInfo = () => { 
              // Convert stored DD/MM/YYYY back to YYYY-MM-DD for input type="date"
              let fmtDate = getTodayYMD();
              if (selectedClient.recordDate) {
                  const parts = selectedClient.recordDate.split('/');
                  if (parts.length === 3) fmtDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
              }
              
              setEditInfoData({ 
                  fullName: selectedClient.fullName, studentId: selectedClient.studentId, 
                  recordDate: fmtDate, disabilityStatus: selectedClient.disabilityStatus || '',
                  age: selectedClient.age, ethnicity: selectedClient.ethnicity || '', religion: selectedClient.religion || '', 
                  category: selectedClient.category, interventionLevel: selectedClient.interventionLevel, 
                  phone: selectedClient.phone, address: selectedClient.address, family: selectedClient.details.family, 
                  needs: selectedClient.details.needs || '', notes: selectedClient.details.notes || '', avatar: selectedClient.avatar 
              }); 
              setIsEditingInfo(true); 
          };
          const saveEditingInfo = () => { 
            const newAlias = getAliasFromName(editInfoData.fullName);
            updateClientInState({ 
                ...selectedClient, fullName: editInfoData.fullName, alias: newAlias, studentId: editInfoData.studentId, 
                recordDate: formatDateToVN(editInfoData.recordDate), disabilityStatus: editInfoData.disabilityStatus,
                age: editInfoData.age, ethnicity: editInfoData.ethnicity, religion: editInfoData.religion, category: editInfoData.category, interventionLevel: editInfoData.interventionLevel, phone: editInfoData.phone, address: editInfoData.address, avatar: editInfoData.avatar, 
                details: { ...selectedClient.details, family: editInfoData.family, needs: editInfoData.needs, notes: editInfoData.notes } 
            }); 
            setIsEditingInfo(false); 
            showAlert('Thành công', 'Đã cập nhật thông tin!', 'success'); 
          };

          // --- ASSESSMENT (SWOT + VẤN ĐỀ) EDIT LOGIC ---
          const startEditingAssessment = () => { 
              setEditAssessmentData({ 
                  S: selectedClient.details.swot.S.join('\n'), W: selectedClient.details.swot.W.join('\n'), 
                  O: selectedClient.details.swot.O.join('\n'), T: selectedClient.details.swot.T.join('\n'),
                  problems: [...(selectedClient.details.problems || [])]
              }); 
              setNewEditProblemText('');
              setIsEditingAssessment(true); 
          };
          const saveEditingAssessment = () => { 
              updateClientInState({ 
                  ...selectedClient, 
                  details: { 
                      ...selectedClient.details, 
                      problems: editAssessmentData.problems,
                      swot: { 
                          S: editAssessmentData.S.split('\n').filter(i=>i.trim()), W: editAssessmentData.W.split('\n').filter(i=>i.trim()), 
                          O: editAssessmentData.O.split('\n').filter(i=>i.trim()), T: editAssessmentData.T.split('\n').filter(i=>i.trim()) 
                      } 
                  } 
              }); 
              setIsEditingAssessment(false); 
              showAlert('Thành công', 'Đã cập nhật Đánh giá và Vấn đề!', 'success'); 
          };

          // --- GOALS EDIT LOGIC ---
          const handleToggleGoalStatus = (goalId, currentStatus) => {
            const newStatus = currentStatus === 'Hoàn thành' ? 'Đang tiến hành' : 'Hoàn thành';
            const updatedGoals = selectedClient.details.goals.map(g => {
              if (g.id !== goalId) return g;
              let kpi = { ...g.kpi };
              if (newStatus === 'Hoàn thành' && g.kpi) { kpi.current = g.kpi.target; kpi.history = [...(kpi.history||[]), { date: new Date().toLocaleDateString('vi-VN'), value: g.kpi.target }]; kpi.history.sort((a, b) => parseDateStr(a.date) - parseDateStr(b.date)); }
              return { ...g, status: newStatus, kpi };
            });
            updateClientInState({ ...selectedClient, details: { ...selectedClient.details, goals: updatedGoals } });
          };

          const handleSaveNewGoal = () => {
            if (!newGoalData.text.trim() || !newGoalData.deadline) { showAlert('Thiếu thông tin', 'Vui lòng nhập tên mục tiêu và ngày hạn.', 'error'); return; }
            const newGoal = { id: Date.now(), text: newGoalData.text, activity: newGoalData.activity, status: 'Chưa bắt đầu', deadline: formatDateToVN(newGoalData.deadline), kpi: { baseline: Number(newGoalData.baseline), current: Number(newGoalData.baseline), target: Number(newGoalData.target), unit: newGoalData.unit, history: [{ date: new Date().toLocaleDateString('vi-VN'), value: Number(newGoalData.baseline) }] } };
            updateClientInState({ ...selectedClient, details: { ...selectedClient.details, goals: [...(selectedClient.details.goals||[]), newGoal] } });
            setNewGoalData({ text: '', deadline: '', baseline: 0, target: 10, unit: 'Điểm', activity: '' }); setShowAddGoalForm(false);
          };

          const handleDeleteGoal = (goalId) => showConfirm('Xác nhận xóa', 'Xóa mục tiêu can thiệp này?', () => updateClientInState({ ...selectedClient, details: { ...selectedClient.details, goals: selectedClient.details.goals.filter(g => g.id !== goalId) } }));

          const startEditingGoal = (goal) => {
            setEditingGoalId(goal.id);
            setEditGoalData({
                text: goal.text, activity: goal.activity || '', deadline: parseDateStr(goal.deadline).toISOString().split('T')[0],
                baseline: goal.kpi.baseline, target: goal.kpi.target, unit: goal.kpi.unit
            });
          };

          const saveEditingGoal = () => {
            if (!editGoalData.text.trim() || !editGoalData.deadline) { showAlert('Lỗi', 'Không được để trống Tên và Ngày hạn', 'error'); return; }
            const updatedGoals = selectedClient.details.goals.map(g => {
                if (g.id === editingGoalId) {
                    const newBase = Number(editGoalData.baseline);
                    const newTarget = Number(editGoalData.target);
                    const isComplete = (newBase < newTarget && g.kpi.current >= newTarget) || (newBase > newTarget && g.kpi.current <= newTarget);
                    return {
                        ...g,
                        text: editGoalData.text,
                        activity: editGoalData.activity,
                        deadline: formatDateToVN(editGoalData.deadline),
                        status: isComplete ? 'Hoàn thành' : (g.kpi.current !== newBase ? 'Đang tiến hành' : 'Chưa bắt đầu'),
                        kpi: { ...g.kpi, baseline: newBase, target: newTarget, unit: editGoalData.unit }
                    };
                }
                return g;
            });
            updateClientInState({ ...selectedClient, details: { ...selectedClient.details, goals: updatedGoals } });
            setEditingGoalId(null);
          };

          const saveKpiUpdate = (goalId) => {
            if (!tempKpiDate) { showAlert('Lỗi', 'Vui lòng chọn ngày tháng.', 'error'); return; }
            const formattedDate = formatDateToVN(tempKpiDate);
            const newCurrent = Number(tempKpiValue);
            const updatedGoals = selectedClient.details.goals.map(g => {
              if (g.id !== goalId) return g;
              const hist = [...(g.kpi.history || [])];
              const existingIndex = hist.findIndex(h => h.date === formattedDate);
              if (existingIndex >= 0) hist[existingIndex].value = newCurrent; else hist.push({ date: formattedDate, value: newCurrent });
              hist.sort((a, b) => parseDateStr(a.date) - parseDateStr(b.date));
              const isComplete = (g.kpi.baseline < g.kpi.target && newCurrent >= g.kpi.target) || (g.kpi.baseline > g.kpi.target && newCurrent <= g.kpi.target);
              return { ...g, status: isComplete ? 'Hoàn thành' : (newCurrent !== g.kpi.baseline ? 'Đang tiến hành' : 'Chưa bắt đầu'), kpi: { ...g.kpi, current: newCurrent, history: hist } };
            });
            updateClientInState({ ...selectedClient, details: { ...selectedClient.details, goals: updatedGoals, timeline: [{ date: formattedDate, event: `Cập nhật điểm KPI mục tiêu: ${selectedClient.details.goals.find(g=>g.id===goalId).text} -> ${tempKpiValue}` }, ...(selectedClient.details.timeline||[])] } });
            setUpdatingGoalId(null);
          };

          const handleSaveNewReferral = () => {
            if (!newRefOrg.trim() || !newRefService.trim()) return;
            updateClientInState({ ...selectedClient, details: { ...selectedClient.details, referrals: [...(selectedClient.details.referrals||[]), { org: newRefOrg, service: newRefService, condition: newRefCondition, status: newRefStatus, date: new Date().toLocaleDateString('vi-VN'), icon: Building }] } });
            setNewRefOrg(''); setNewRefService(''); setNewRefCondition(''); setNewRefStatus('Đã kết nối'); setShowAddReferralForm(false);
          };
          
          const handleDeleteReferral = (index) => {
            showConfirm('Xác nhận xóa', 'Bạn muốn xóa nguồn lực hỗ trợ này?', () => {
              const updatedReferrals = selectedClient.details.referrals.filter((_, i) => i !== index);
              updateClientInState({ ...selectedClient, details: { ...selectedClient.details, referrals: updatedReferrals } });
            });
          };
          
          const handleCloseCase = () => showConfirm('Đóng ca', 'Hành động này sẽ lưu trữ hồ sơ.', () => { updateClientInState({ ...selectedClient, status: 'Đã đóng ca', details: { ...selectedClient.details, timeline: [{ date: new Date().toLocaleDateString('vi-VN'), event: 'Tiến hành lượng giá cuối kỳ. Đóng ca.' }, ...(selectedClient.details.timeline||[])] } }); showAlert('Thành công', 'Đã đóng ca!', 'success'); setActiveTab('clients'); });
          const handleReopenCase = () => showConfirm('Mở lại hồ sơ', 'Bạn muốn mở lại hồ sơ này?', () => { updateClientInState({ ...selectedClient, status: 'Đang can thiệp', details: { ...selectedClient.details, timeline: [{ date: new Date().toLocaleDateString('vi-VN'), event: 'Hồ sơ được mở lại.' }, ...(selectedClient.details.timeline||[])] } }); showAlert('Thành công', 'Đã mở lại hồ sơ!', 'success'); });

          // AI EXTRACTION
          const runGeminiExtraction = async (textToProcess) => {
            setIsExtractingInfo(true); setExtractError(''); 
            const apiKey = ""; 
            const modelName = apiKey ? "gemini-1.5-flash" : "gemini-2.5-flash-preview-09-2025";
            
            const prompt = `Bạn là Nhân viên CTXH chuyên nghiệp. Hãy phân tích báo cáo sau và xuất ra ĐÚNG ĐỊNH DẠNG JSON.
            Cấu trúc JSON yêu cầu:
            {
              "recordDate": "Ngày ghi nhận hồ sơ (Định dạng YYYY-MM-DD)",
              "fullName": "Họ và tên thật của thân chủ",
              "studentId": "Mã số sinh viên (nếu có)",
              "age": "Số tuổi",
              "disabilityStatus": "Tình trạng khuyết tật (VD: Vận động, Thị giác, Thính giác, Không có, v.v.)",
              "ethnicity": "Dân tộc",
              "religion": "Tôn giáo",
              "category": "Nhóm đối tượng chính",
              "interventionLevel": "BẮT BUỘC CHỌN 1 TRONG 4 (Can thiệp Khẩn cấp, Can thiệp Chuyên sâu, Hỗ trợ Cơ bản, Phòng ngừa/Theo dõi)",
              "phone": "Số điện thoại",
              "address": "Nơi ở hiện tại",
              "family": "Tóm tắt hoàn cảnh gia đình",
              "needs": "Nhu cầu, mong muốn của thân chủ",
              "problems": ["Vấn đề ưu tiên 1", "Vấn đề ưu tiên 2", "Vấn đề ưu tiên 3"],
              "swot_S": "Gạch đầu dòng điểm mạnh",
              "swot_W": "Gạch đầu dòng điểm yếu",
              "swot_O": "Gạch đầu dòng cơ hội",
              "swot_T": "Gạch đầu dòng thách thức",
              "notes": "Ghi chú chuyên môn thêm (Nếu có)"
            }
            
            Văn bản cần phân tích: "${textToProcess}"`;
            
            try {
              let response; let retries = 0; const delays = [1000, 2000, 4000];
              while (retries < 3) {
                try { 
                    response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: prompt }] }], 
                            generationConfig: { responseMimeType: "application/json" } 
                        }) 
                    }); 
                    if (response.ok) break; 
                } catch (e) {}
                await new Promise(res => setTimeout(res, delays[retries])); 
                retries++;
              }
              
              if (!response?.ok) throw new Error(`Lỗi HTTP ${response?.status}: Vui lòng kiểm tra lại API Key.`);
              
              const data = await response.json();
              const jsonString = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
              
              try { 
                  const parsedData = JSON.parse(jsonString);
                  setNewClient(prev => ({ ...prev, ...parsedData })); 
              } catch (e) { 
                  setExtractError('AI trả lời sai định dạng JSON. Bạn hãy điền thủ công.'); 
              }
            } catch (error) { 
                setExtractError(`LỖI HỆ THỐNG: ${error.message}`); 
            } finally { 
                setIsExtractingInfo(false); 
            }
          };

          const handleAutoFillNotes = () => { if (!rawNotes.trim()) { setExtractError('Vui lòng nhập nội dung báo cáo.'); return; } runGeminiExtraction(rawNotes); };
          
          const handleFileUpload = (e) => { 
            const file = e.target.files[0]; 
            if (!file) return; 
            setIsExtractingInfo(true); 
            setExtractError(''); 
            
            if (file.name.endsWith('.docx')) { 
                const reader = new FileReader();
                reader.onload = function(event) {
                    const arrayBuffer = event.target.result;
                    if(window.mammoth) {
                        window.mammoth.extractRawText({arrayBuffer: arrayBuffer})
                            .then(async function(result) {
                                const text = result.value;
                                setRawNotes(text);
                                await runGeminiExtraction(text);
                            })
                            .catch(function(err) {
                                setExtractError('Lỗi đọc file DOCX: ' + err.message);
                                setIsExtractingInfo(false);
                            });
                    } else {
                        setExtractError('Thư viện đọc DOCX chưa sẵn sàng.');
                        setIsExtractingInfo(false);
                    }
                };
                reader.readAsArrayBuffer(file);
            } 
            else if (file.name.endsWith('.txt')) { 
                const reader = new FileReader(); 
                reader.onload = async (e) => { 
                    setRawNotes(e.target.result); 
                    await runGeminiExtraction(e.target.result); 
                }; 
                reader.readAsText(file); 
            } else {
                setExtractError('Chỉ hỗ trợ tải lên file .txt hoặc .docx');
                setIsExtractingInfo(false);
            }
          };
          
          const handleSaveNewClient = () => {
            if (!newClient.fullName) { showAlert('Lỗi', 'Cần nhập Họ và tên đầy đủ.', 'error'); return; }
            const recordDateVN = formatDateToVN(newClient.recordDate);
            const processArr = (val) => Array.isArray(val) ? val : (val ? val.split('\n').filter(i=>i.trim()) : ['Chưa cập nhật']);
            
            const newAlias = getAliasFromName(newClient.fullName);
            
            setClients([{ 
              id: `KH-${Math.floor(Math.random() * 1000).toString().padStart(3, '0')}`, 
              recordDate: recordDateVN,
              fullName: newClient.fullName,
              alias: newAlias, 
              studentId: newClient.studentId,
              disabilityStatus: newClient.disabilityStatus || 'Không có / Chưa rõ',
              age: newClient.age || 'N/A', 
              ethnicity: newClient.ethnicity || 'Không rõ',
              religion: newClient.religion || 'Không rõ',
              category: newClient.category || 'Chưa phân loại', 
              interventionLevel: newClient.interventionLevel || 'Phòng ngừa/Theo dõi', 
              lastVisit: recordDateVN, status: 'Tiếp nhận mới', phone: newClient.phone, address: newClient.address, avatar: newClient.avatar,
              details: { family: newClient.family || 'Chưa thu thập', needs: newClient.needs || 'Chưa ghi nhận', history: newClient.history || 'Chưa thu thập', problems: newClient.problems || [], swot: { S: processArr(newClient.swot_S), W: processArr(newClient.swot_W), O: processArr(newClient.swot_O), T: processArr(newClient.swot_T) }, notes: newClient.notes || '', evaluationNotes: '', goals: [], referrals: [], timeline: [{ date: recordDateVN, event: `Khởi tạo hồ sơ.` }] } 
            }, ...clients]);
            
            setNewClient({ fullName: '', studentId: '', recordDate: getTodayYMD(), disabilityStatus: '', alias: '', age: '', ethnicity: '', religion: '', category: '', phone: '', address: '', interventionLevel: 'Phòng ngừa/Theo dõi', family: '', history: '', needs: '', problems: [], swot_S: '', swot_W: '', swot_O: '', swot_T: '', avatar: '', notes: '' }); 
            setRawNotes(''); 
            showAlert('Thành công', 'Đã lưu Hồ sơ mới.', 'success'); 
            setActiveTab('clients');
          };

          // Lọc danh sách: Vừa lọc theo Trạng thái (Đang quản lý/Đóng ca), vừa lọc theo Từ khóa tìm kiếm
          const filteredClients = clients.filter(c => {
              const statusMatch = clientFilter === 'active' ? c.status !== 'Đã đóng ca' : c.status === 'Đã đóng ca';
              const lowerQ = searchQuery.toLowerCase();
              const searchMatch = !searchQuery || (
                  (c.fullName || '').toLowerCase().includes(lowerQ) ||
                  (c.alias || '').toLowerCase().includes(lowerQ) ||
                  (c.id || '').toLowerCase().includes(lowerQ) ||
                  (c.studentId || '').toLowerCase().includes(lowerQ) ||
                  String(c.age || '').includes(lowerQ) ||
                  (c.category || '').toLowerCase().includes(lowerQ) ||
                  (c.disabilityStatus || '').toLowerCase().includes(lowerQ) ||
                  (c.address || '').toLowerCase().includes(lowerQ) ||
                  (c.phone || '').includes(lowerQ) ||
                  (c.interventionLevel || '').toLowerCase().includes(lowerQ) ||
                  (c.details?.family || '').toLowerCase().includes(lowerQ) ||
                  (c.details?.needs || '').toLowerCase().includes(lowerQ) ||
                  (c.details?.notes || '').toLowerCase().includes(lowerQ) ||
                  (c.details?.problems || []).some(p => p.toLowerCase().includes(lowerQ))
              );
              return statusMatch && searchMatch;
          });

          return (
            <div className="flex h-screen bg-slate-50 font-sans text-gray-800 relative">
              {modalConfig.isOpen && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={modalConfig.type !== 'confirm' ? modalConfig.onConfirm : undefined}></div>
                  <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 relative z-10 animate-in">
                    <div className="flex items-center gap-3 mb-4">
                      {modalConfig.type === 'error' && <AlertTriangle size={28} className="text-red-500" />}
                      {modalConfig.type === 'success' && <CheckCircle size={28} className="text-green-500" />}
                      {modalConfig.type === 'confirm' && <AlertTriangle size={28} className="text-amber-500" />}
                      {modalConfig.type === 'info' && <Info size={28} className="text-blue-500" />}
                      <h3 className="text-xl font-bold text-slate-800">{modalConfig.title}</h3>
                    </div>
                    <p className="text-slate-600 mb-8 whitespace-pre-wrap leading-relaxed">{modalConfig.message}</p>
                    <div className="flex justify-end gap-3">
                      {modalConfig.type === 'confirm' && <button onClick={modalConfig.onCancel} className="px-5 py-2.5 text-slate-600 font-bold bg-slate-100 rounded-xl hover:bg-slate-200">Hủy bỏ</button>}
                      <button onClick={modalConfig.onConfirm} className={`px-5 py-2.5 text-white font-bold rounded-xl ${modalConfig.type === 'error' ? 'bg-red-600' : modalConfig.type === 'confirm' ? 'bg-amber-600' : 'bg-blue-600'}`}>{modalConfig.type === 'confirm' ? 'Đồng ý' : 'Đóng'}</button>
                    </div>
                  </div>
                </div>
              )}

              <div className="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-20 shrink-0">
                <div className="p-6"><h1 className="text-3xl font-black text-blue-400">USSH <span className="text-white">HCM</span></h1><p className="text-xs text-slate-400 mt-1">Hệ thống Quản lý Ca</p></div>
                <nav className="flex-1 px-4 space-y-2 mt-4">
                  <button onClick={() => {setActiveTab('dashboard'); setSelectedClient(null);}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg font-medium ${activeTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}`}><LayoutDashboard size={20} /> Tổng quan</button>
                  <button onClick={() => {setActiveTab('clients'); setSelectedClient(null);}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg font-medium ${activeTab === 'clients' || activeTab === 'clientDetail' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}`}><Users size={20} /> Hồ sơ Thân chủ</button>
                  <button onClick={() => {setActiveTab('addClient'); setSelectedClient(null);}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg font-medium ${activeTab === 'addClient' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}`}><FileSignature size={20} /> Phiếu Tiếp nhận</button>
                </nav>
                
                <div className="p-4 mt-auto border-t border-slate-800">
                    <button onClick={handleResetAllData} className="w-full flex items-center justify-center gap-2 px-4 py-2 bg-slate-800 text-slate-400 hover:bg-red-900/50 hover:text-red-400 rounded-lg text-xs font-bold transition-all">
                        <Trash2 size={14} /> Xóa dữ liệu (Reset Demo)
                    </button>
                </div>
              </div>

              <div className="flex-1 flex flex-col overflow-hidden relative">
                <header className="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm shrink-0 z-10">
                  <h2 className="text-xl font-bold text-slate-800">{activeTab === 'dashboard' ? 'Bảng Điều Khiển' : activeTab === 'clients' ? 'Danh Sách Hồ Sơ Quản Lý' : activeTab === 'addClient' ? 'Phiếu Tiếp Nhận Đánh Giá Ban Đầu' : 'Chi tiết Hệ sinh thái Can thiệp'}</h2>
                  <div className="flex items-center gap-4"><div className="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-full text-sm font-medium text-slate-600"><div className="w-2 h-2 rounded-full bg-green-500"></div> Mạng nội bộ bảo mật</div></div>
                </header>

                <main className="flex-1 overflow-y-auto p-8 bg-slate-50/50 hide-scrollbar">
                  
                  {activeTab === 'dashboard' && (
                     <div className="space-y-6 animate-in">
                       <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                         <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-blue-500"><h3 className="text-sm text-slate-500 font-bold">Đang quản lý</h3><p className="text-3xl font-black text-slate-800 mt-2">{clients.filter(c => c.status !== 'Đã đóng ca').length}</p></div>
                         <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-red-500"><h3 className="text-sm text-slate-500 font-bold">Báo động Khẩn cấp</h3><p className="text-3xl font-black text-red-600 mt-2">{clients.filter(c => c.interventionLevel === 'Can thiệp Khẩn cấp' && c.status !== 'Đã đóng ca').length}</p></div>
                         <button onClick={() => setActiveTab('addClient')} className="bg-blue-600 p-6 rounded-2xl shadow-md text-white hover:bg-blue-700 transition-all flex flex-col justify-center items-center gap-2"><PlusCircle size={32} /><span className="font-bold">Tạo hồ sơ mới</span></button>
                       </div>
                       <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                         <div className="p-5 border-b border-slate-100 bg-amber-50 flex items-center gap-3"><BellRing size={24} className="text-amber-600" /><h3 className="font-bold text-lg text-amber-900">Chuông Báo Hệ Thống</h3></div>
                         <div className="p-6">
                           {systemWarnings.length > 0 ? (
                             <div className="grid gap-4">
                               {systemWarnings.map((w, i) => (
                                 <div key={i} className={`flex items-center justify-between p-4 border rounded-xl ${w.warn.bg} ${w.warn.border}`}>
                                   <div><div className="flex items-center gap-2 mb-1"><span className="font-black text-slate-800">{w.client.id}</span><span className="text-sm text-slate-500">• {w.client.alias}</span></div><p className="font-medium text-slate-700">{w.goal.text}</p></div>
                                   <div className="flex flex-col items-end gap-2"><span className={`px-3 py-1 rounded-full text-xs font-bold ${w.warn.color} bg-white border ${w.warn.border}`}>{w.warn.text} (Hạn: {w.goal.deadline})</span><button onClick={() => navToClientDetail(w.client, 'plan')} className="text-sm font-bold text-blue-600 hover:underline">Cập nhật ngay &rarr;</button></div>
                                 </div>
                               ))}
                             </div>
                           ) : (<div className="text-center py-8 text-slate-500"><CheckCircle size={48} className="mx-auto mb-3 text-green-300" /><p className="font-medium">Không có mục tiêu nào bị quá hạn.</p></div>)}
                         </div>
                       </div>
                     </div>
                  )}

                  {activeTab === 'clients' && (
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-in">
                      <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white flex-wrap gap-4">
                        <div><h3 className="font-bold text-lg">Quản lý Hồ sơ</h3><p className="text-sm text-slate-500 mt-1 flex items-center gap-1"><ShieldAlert size={14}/> Dữ liệu mã hóa (Tự động lưu Offline)</p></div>
                        <div className="flex items-center gap-3 flex-wrap">
                          
                          {/* THANH TÌM KIẾM */}
                          <div className="relative">
                            <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                            <input 
                              type="text" 
                              placeholder="Tìm kiếm (Tên, Tuổi, MSSV, Vấn đề...)" 
                              value={searchQuery}
                              onChange={(e) => setSearchQuery(e.target.value)}
                              className="pl-9 pr-4 py-2 rounded-lg border border-slate-200 text-sm outline-none w-64 lg:w-80 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                            />
                          </div>

                          <div className="flex bg-slate-100 p-1 rounded-lg">
                            <button onClick={() => setClientFilter('active')} className={`px-4 py-2 rounded-md text-sm font-bold ${clientFilter === 'active' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500'}`}>Đang quản lý</button>
                            <button onClick={() => setClientFilter('closed')} className={`px-4 py-2 rounded-md text-sm font-bold ${clientFilter === 'closed' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500'}`}>Đã đóng ca</button>
                          </div>
                          <button onClick={() => setActiveTab('addClient')} className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2.5 rounded-lg font-bold text-sm"><PlusCircle size={16}/> Thêm Mới</button>
                        </div>
                      </div>
                      <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                          <thead><tr className="bg-slate-50 text-sm text-slate-500 uppercase"><th className="p-4 font-bold">Mã Thân Chủ</th><th className="p-4 font-bold">Bí danh</th><th className="p-4 font-bold">MSSV</th><th className="p-4 font-bold">Nhóm đối tượng</th><th className="p-4 font-bold">Mức Can Thiệp</th><th className="p-4 font-bold text-center">Thao tác</th></tr></thead>
                          <tbody>
                            {filteredClients.length > 0 ? filteredClients.map((client) => (
                              <tr key={client.id} className={`border-b border-slate-100 ${client.status === 'Đã đóng ca' ? 'bg-slate-50 opacity-75' : 'hover:bg-blue-50/50'}`}>
                                <td className="p-4 font-black text-blue-700">{client.id}</td>
