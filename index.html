                                    </div>
                                    <div><label className="block text-sm font-bold mb-1">Độ tuổi</label><input type="text" value={editInfoData.age} onChange={(e) => setEditInfoData({...editInfoData, age: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                                    <div><label className="block text-sm font-bold mb-1">Dân tộc</label><input type="text" value={editInfoData.ethnicity || ''} onChange={(e) => setEditInfoData({...editInfoData, ethnicity: e.target.value})} className="w-full p-2 border rounded-lg" placeholder="VD: Kinh" /></div>
                                    <div><label className="block text-sm font-bold mb-1">Tôn giáo</label><input type="text" value={editInfoData.religion || ''} onChange={(e) => setEditInfoData({...editInfoData, religion: e.target.value})} className="w-full p-2 border rounded-lg" placeholder="VD: Không" /></div>
                                    <div className="md:col-span-2"><label className="block text-sm font-bold mb-1">Gia đình</label><textarea rows={3} value={editInfoData.family} onChange={(e) => setEditInfoData({...editInfoData, family: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                                    <div className="md:col-span-2"><label className="block text-sm font-bold mb-1">Nhu cầu, mong muốn của thân chủ</label><textarea rows={3} value={editInfoData.needs} onChange={(e) => setEditInfoData({...editInfoData, needs: e.target.value})} className="w-full p-2 border rounded-lg" placeholder="Thân chủ mong muốn được hỗ trợ gì?..." /></div>
                                    <div className="md:col-span-2"><label className="block text-sm font-bold mb-1">Ghi chú chuyên môn</label><textarea rows={3} value={editInfoData.notes} onChange={(e) => setEditInfoData({...editInfoData, notes: e.target.value})} className="w-full p-2 border rounded-lg" placeholder="Ghi chú thêm về ca này..." /></div>
                                  </div>
                                </div>
                              )}
                            </div>
                          )}

                          {/* TAB 2: ĐÁNH GIÁ (VẤN ĐỀ + SWOT) */}
                          {detailSubTab === 'assessment' && (
                            <div className="space-y-6 animate-in">
                               <div className="flex justify-between items-start mb-6">
                                <h3 className="font-black text-xl text-slate-800">Đánh giá & Phân tích Vấn đề</h3>
                                {!isEditingAssessment ? ( <button onClick={startEditingAssessment} className="flex items-center gap-2 bg-slate-100 text-slate-700 px-4 py-2 rounded-lg font-bold text-sm"><Edit3 size={16}/> Chỉnh sửa</button>
                                ) : ( <div className="flex gap-2"><button onClick={() => setIsEditingAssessment(false)} className="px-4 py-2 text-slate-600 bg-slate-100 rounded-lg font-bold text-sm">Hủy</button><button onClick={saveEditingAssessment} className="px-4 py-2 bg-blue-600 text-white rounded-lg font-bold text-sm flex items-center gap-2"><Save size={16}/> Lưu lại</button></div> )}
                               </div>
                               
                               {!isEditingAssessment ? (
                                 <div className="space-y-6">
                                    {/* Màn hình hiển thị Vấn đề */}
                                    <div className="bg-amber-50 border border-amber-200 p-6 rounded-2xl">
                                        <h4 className="font-bold text-amber-900 text-lg mb-4 border-b border-amber-200 pb-2">Danh sách Vấn đề Ưu tiên</h4>
                                        {selectedClient.details?.problems?.length > 0 ? (
                                            <ul className="space-y-3">
                                                {selectedClient.details.problems.map((prob, idx) => (
                                                    <li key={idx} className="flex items-start text-amber-900 bg-white p-3 rounded-lg shadow-sm border border-amber-100">
                                                        <span className="font-black text-amber-600 mr-3 text-lg w-6">{idx + 1}.</span> 
                                                        <span className="font-medium pt-0.5">{prob}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        ) : (<p className="text-amber-700 italic">Chưa có đánh giá vấn đề.</p>)}
                                    </div>

                                    {/* Màn hình hiển thị SWOT */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-emerald-50 border border-emerald-200 p-6 rounded-2xl"><h4 className="font-bold text-emerald-800 mb-4 border-b border-emerald-200 pb-2">S - Điểm mạnh</h4><ul className="space-y-2">{selectedClient.details?.swot?.S?.map((s, i) => (<li key={i} className="flex text-emerald-900 text-sm font-medium"><CheckCircle size={16} className="text-emerald-500 mr-2 mt-0.5"/> {s}</li>))}</ul></div>
                                        <div className="bg-orange-50 border border-orange-200 p-6 rounded-2xl"><h4 className="font-bold text-orange-800 mb-4 border-b border-orange-200 pb-2">W - Điểm yếu</h4><ul className="space-y-2">{selectedClient.details?.swot?.W?.map((w, i) => (<li key={i} className="flex text-orange-900 text-sm font-medium"><div className="w-1.5 h-1.5 rounded-full bg-orange-500 mr-2 mt-1.5"/> {w}</li>))}</ul></div>
                                        <div className="bg-blue-50 border border-blue-200 p-6 rounded-2xl"><h4 className="font-bold text-blue-800 mb-4 border-b border-blue-200 pb-2">O - Cơ hội</h4><ul className="space-y-2">{selectedClient.details?.swot?.O?.map((o, i) => (<li key={i} className="flex text-blue-900 text-sm font-medium"><div className="w-1.5 h-1.5 rounded-full bg-blue-500 mr-2 mt-1.5"/> {o}</li>))}</ul></div>
                                        <div className="bg-purple-50 border border-purple-200 p-6 rounded-2xl"><h4 className="font-bold text-purple-800 mb-4 border-b border-purple-200 pb-2">T - Thách thức</h4><ul className="space-y-2">{selectedClient.details?.swot?.T?.map((t, i) => (<li key={i} className="flex text-purple-900 text-sm font-medium"><div className="w-1.5 h-1.5 rounded-full bg-purple-500 mr-2 mt-1.5"/> {t}</li>))}</ul></div>
                                    </div>
                                 </div>
                               ) : (
                                 <div className="space-y-6">
                                    {/* Màn hình sửa Vấn đề */}
                                    <div className="bg-amber-50 p-6 rounded-2xl border border-amber-200">
                                        <label className="block text-sm font-bold text-amber-900 mb-3">Danh sách Vấn đề Ưu tiên (Sắp xếp theo mức độ nghiêm trọng)</label>
                                        <div className="flex gap-2 mb-4">
                                            <input type="text" value={newEditProblemText} onChange={e => setNewEditProblemText(e.target.value)} onKeyPress={e => {if(e.key==='Enter'){e.preventDefault(); if(newEditProblemText.trim()){setEditAssessmentData({...editAssessmentData, problems: [...editAssessmentData.problems, newEditProblemText.trim()]}); setNewEditProblemText('');}}}} placeholder="Nhập vấn đề mới và nhấn nút Thêm..." className="flex-1 p-2 rounded-lg border outline-none" />
                                            <button onClick={() => {if(newEditProblemText.trim()){setEditAssessmentData({...editAssessmentData, problems: [...editAssessmentData.problems, newEditProblemText.trim()]}); setNewEditProblemText('');}}} className="px-4 py-2 bg-amber-600 text-white font-bold rounded-lg whitespace-nowrap">Thêm</button>
                                        </div>
                                        <div className="space-y-2">
                                            {editAssessmentData.problems.map((prob, idx) => (
                                                <div key={idx} className="flex justify-between items-center bg-white p-3 rounded border shadow-sm">
                                                    <span className="font-medium"><span className="text-amber-600 font-black mr-2">{idx + 1}.</span> <input type="text" value={prob} onChange={e => {const newProbs = [...editAssessmentData.problems]; newProbs[idx] = e.target.value; setEditAssessmentData({...editAssessmentData, problems: newProbs});}} className="outline-none border-b border-dashed border-slate-300 bg-transparent w-full min-w-[300px]"/></span>
                                                    <div className="flex gap-1 shrink-0">
                                                        <button onClick={() => setEditAssessmentData({...editAssessmentData, problems: moveArrayItem(editAssessmentData.problems, idx, 'up')})} className="p-1 text-slate-400 hover:text-blue-600" disabled={idx===0}><ArrowUp size={16}/></button>
                                                        <button onClick={() => setEditAssessmentData({...editAssessmentData, problems: moveArrayItem(editAssessmentData.problems, idx, 'down')})} className="p-1 text-slate-400 hover:text-blue-600" disabled={idx===editAssessmentData.problems.length-1}><ArrowDown size={16}/></button>
                                                        <button onClick={() => setEditAssessmentData({...editAssessmentData, problems: editAssessmentData.problems.filter((_, i) => i !== idx)})} className="p-1 text-slate-400 hover:text-red-600 ml-2"><Trash2 size={16}/></button>
                                                    </div>
                                                </div>
                                            ))}
                                            {editAssessmentData.problems.length === 0 && <p className="text-sm text-amber-700 italic">Chưa có vấn đề.</p>}
                                        </div>
                                    </div>

                                    {/* Màn hình sửa SWOT */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50 p-6 rounded-2xl border border-blue-100">
                                        <div><label className="block text-sm font-bold text-emerald-700 mb-2">Điểm mạnh</label><textarea rows={4} value={editAssessmentData.S} onChange={(e) => setEditAssessmentData({...editAssessmentData, S: e.target.value})} className="w-full p-3 border rounded-xl outline-none" /></div>
                                        <div><label className="block text-sm font-bold text-orange-700 mb-2">Điểm yếu</label><textarea rows={4} value={editAssessmentData.W} onChange={(e) => setEditAssessmentData({...editAssessmentData, W: e.target.value})} className="w-full p-3 border rounded-xl outline-none" /></div>
                                        <div><label className="block text-sm font-bold text-blue-700 mb-2">Cơ hội</label><textarea rows={4} value={editAssessmentData.O} onChange={(e) => setEditAssessmentData({...editAssessmentData, O: e.target.value})} className="w-full p-3 border rounded-xl outline-none" /></div>
                                        <div><label className="block text-sm font-bold text-purple-700 mb-2">Thách thức</label><textarea rows={4} value={editAssessmentData.T} onChange={(e) => setEditAssessmentData({...editAssessmentData, T: e.target.value})} className="w-full p-3 border rounded-xl outline-none" /></div>
                                    </div>
                                 </div>
                               )}
                            </div>
                          )}

                          {/* TAB 3: PLAN */}
                          {detailSubTab === 'plan' && (
                            <div className="animate-in">
                              <div className="flex justify-between items-center mb-6"><h3 className="font-black text-xl text-slate-800">Lộ trình Hỗ trợ KPI</h3><button onClick={() => {setShowAddGoalForm(!showAddGoalForm); setEditingGoalId(null);}} className="text-blue-600 font-bold bg-blue-50 px-3 py-1.5 rounded-lg">Thêm mục tiêu</button></div>

                              {showAddGoalForm && (
                                <div className="mb-6 bg-white p-6 rounded-2xl border border-blue-200 shadow-xl">
                                  <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-5">
                                    <div className="md:col-span-3"><label className="block text-sm font-bold mb-1">Nội dung Mục tiêu</label><input type="text" value={newGoalData.text} onChange={(e) => setNewGoalData({...newGoalData, text: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                                    <div className="md:col-span-3"><label className="block text-sm font-bold mb-1">Hoạt động (Các bước thực hiện)</label><textarea rows="2" value={newGoalData.activity} onChange={(e) => setNewGoalData({...newGoalData, activity: e.target.value})} className="w-full p-2 border rounded-lg" placeholder="VD: Đăng ký lớp học nghề, Tham vấn 1-1..."></textarea></div>
                                    <div><label className="block text-sm font-bold mb-1">Chỉ số gốc (Baseline)</label><input type="number" step="any" value={newGoalData.baseline} onChange={(e) => setNewGoalData({...newGoalData, baseline: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                                    <div><label className="block text-sm font-bold mb-1">Chỉ số đích (Target)</label><input type="number" step="any" value={newGoalData.target} onChange={(e) => setNewGoalData({...newGoalData, target: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                                    <div><label className="block text-sm font-bold mb-1">Đơn vị đo (Ví dụ: Lần, Điểm)</label><input type="text" value={newGoalData.unit} onChange={(e) => setNewGoalData({...newGoalData, unit: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                                    <div className="md:col-span-3"><label className="block text-sm font-bold mb-1">Ngày Hết Hạn</label><input type="date" value={newGoalData.deadline} onChange={(e) => setNewGoalData({...newGoalData, deadline: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                                  </div>
                                  <div className="flex justify-end gap-3"><button onClick={() => setShowAddGoalForm(false)} className="px-5 py-2 bg-slate-100 rounded-lg font-bold">Hủy</button><button onClick={handleSaveNewGoal} className="px-5 py-2 bg-blue-600 text-white rounded-lg font-bold">Lưu Mục Tiêu</button></div>
                                </div>
                              )}
                              
                              {selectedClient.details?.goals?.length > 0 ? (
                                <div className="space-y-4">
                                  {selectedClient.details.goals.map(goal => {
                                    const warning = getGoalWarning(goal.deadline, goal.status);
                                    const isEditingThisGoal = editingGoalId === goal.id;
                                    
                                    if (isEditingThisGoal) {
                                      return (
                                        <div key={goal.id} className="p-6 bg-blue-50 border border-blue-200 rounded-xl shadow-md">
                                          <h4 className="font-bold text-blue-800 mb-4">Sửa cấu trúc Mục tiêu KPI</h4>
                                          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                            <div className="md:col-span-3"><label className="block text-xs font-bold text-slate-500 mb-1">Nội dung</label><input type="text" value={editGoalData.text} onChange={(e) => setEditGoalData({...editGoalData, text: e.target.value})} className="w-full p-2 border rounded" /></div>
                                            <div className="md:col-span-3"><label className="block text-xs font-bold text-slate-500 mb-1">Hoạt động (Các bước thực hiện)</label><textarea rows="2" value={editGoalData.activity} onChange={(e) => setEditGoalData({...editGoalData, activity: e.target.value})} className="w-full p-2 border rounded"></textarea></div>
                                            <div><label className="block text-xs font-bold text-slate-500 mb-1">Baseline (Gốc)</label><input type="number" step="any" value={editGoalData.baseline} onChange={(e) => setEditGoalData({...editGoalData, baseline: e.target.value})} className="w-full p-2 border rounded" /></div>
                                            <div><label className="block text-xs font-bold text-slate-500 mb-1">Target (Đích)</label><input type="number" step="any" value={editGoalData.target} onChange={(e) => setEditGoalData({...editGoalData, target: e.target.value})} className="w-full p-2 border rounded" /></div>
                                            <div><label className="block text-xs font-bold text-slate-500 mb-1">Đơn vị đo</label><input type="text" value={editGoalData.unit} onChange={(e) => setEditGoalData({...editGoalData, unit: e.target.value})} className="w-full p-2 border rounded" /></div>
                                            <div className="md:col-span-3"><label className="block text-xs font-bold text-slate-500 mb-1">Ngày Hạn</label><input type="date" value={editGoalData.deadline} onChange={(e) => setEditGoalData({...editGoalData, deadline: e.target.value})} className="w-full p-2 border rounded" /></div>
                                          </div>
                                          <div className="flex justify-end gap-2"><button onClick={() => setEditingGoalId(null)} className="px-4 py-1.5 bg-white border text-slate-600 rounded font-bold text-sm">Hủy</button><button onClick={saveEditingGoal} className="px-4 py-1.5 bg-blue-600 text-white rounded font-bold text-sm">Lưu Thay Đổi</button></div>
                                        </div>
                                      );
                                    }

                                    return (
                                    <div key={goal.id} className={`p-5 bg-white border rounded-xl shadow-sm ${warning ? warning.border : 'border-slate-200'}`}>
                                      <div className="flex justify-between gap-3 mb-4">
                                        <div className="flex items-center gap-3">
                                          <div onClick={() => handleToggleGoalStatus(goal.id, goal.status)} className={`w-6 h-6 rounded border-2 flex items-center justify-center cursor-pointer shrink-0 ${goal.status === 'Hoàn thành' ? 'bg-blue-600 border-blue-600' : 'border-slate-300'}`}>{goal.status === 'Hoàn thành' && <CheckCircle size={16} className="text-white" />}</div>
                                          <div>
                                            <span className={`font-bold text-lg ${goal.status === 'Hoàn thành' ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{goal.text}</span>
                                            <div className="flex items-center gap-3 mt-1"><span className="text-xs font-bold text-slate-500">Hạn: {goal.deadline || 'Chưa xác định'}</span>{warning && (<span className={`text-[11px] font-bold px-2 py-0.5 rounded ${warning.color} ${warning.bg}`}>{warning.text}</span>)}</div>
                                          </div>
                                        </div>
                                        <div className="flex items-center gap-1">
                                            <button onClick={() => startEditingGoal(goal)} className="text-slate-400 hover:text-blue-600 p-2"><Edit3 size={18} /></button>
                                            <button onClick={() => handleDeleteGoal(goal.id)} className="text-slate-400 hover:text-red-500 p-2"><Trash2 size={18} /></button>
                                        </div>
                                      </div>

                                      {goal.activity && (
                                        <div className="mb-4 p-3 bg-slate-50 border border-slate-100 rounded-lg text-sm text-slate-700 whitespace-pre-wrap">
                                          <strong className="text-slate-800">Hoạt động:</strong><br/>{goal.activity}
                                        </div>
                                      )}

                                      {goal.kpi && (
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-between items-center flex-wrap gap-4">
                                          <div className="flex items-center gap-4 text-sm font-medium">
                                            <div className="flex flex-col"><span className="text-xs text-slate-400">Baseline</span><span className="font-bold text-slate-700">{goal.kpi.baseline}</span></div><ArrowRight size={14} className="text-slate-300"/>
                                            <div className="flex flex-col"><span className="text-xs text-blue-500 font-bold">Hiện tại</span><span className="font-black text-blue-700 text-lg">{goal.kpi.current}</span></div><ArrowRight size={14} className="text-slate-300"/>
                                            <div className="flex flex-col"><span className="text-xs text-slate-400">Đích</span><span className="font-bold text-emerald-600">{goal.kpi.target} {goal.kpi.unit}</span></div>
                                          </div>
                                          
                                          {updatingGoalId === goal.id ? (
                                            <div className="flex gap-2">
                                              <input type="date" value={tempKpiDate} onChange={e => setTempKpiDate(e.target.value)} className="p-1 border rounded text-sm" />
                                              <input type="number" step="any" value={tempKpiValue} onChange={e => setTempKpiValue(e.target.value)} className="w-16 p-1 border rounded text-center text-sm" />
                                              <button onClick={() => saveKpiUpdate(goal.id)} className="bg-blue-600 text-white p-1.5 rounded"><CheckCircle size={16}/></button>
                                            </div>
                                          ) : (
                                            <button onClick={() => { setUpdatingGoalId(goal.id); setTempKpiValue(goal.kpi.current); const d = new Date(); setTempKpiDate(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`); }} className="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-2 rounded-lg hover:bg-blue-100">Chấm điểm Giai đoạn</button>
                                          )}
                                        </div>
                                      )}
                                    </div>
                                  )})}
                                </div>
                              ) : (<p className="text-center py-8">Chưa có mục tiêu.</p>)}
                            </div>
                          )}

                          {/* TAB 4: REFERRALS */}
                          {detailSubTab === 'referrals' && (
                            <div className="animate-in">
                               <h3 className="font-black text-xl mb-6">Nguồn lực Hỗ trợ (Referrals)</h3>
                               {selectedClient.details?.referrals?.map((ref, idx) => (
                                <div key={idx} className="flex justify-between p-5 bg-white border rounded-2xl shadow-sm mb-4">
                                  <div>
                                    <h4 className="font-bold text-lg">{ref.org}</h4>
                                    <p className="font-medium text-slate-500">{ref.service}</p>
                                    {ref.condition && <p className="text-sm text-slate-600 mt-2">Tình trạng nguồn lực: <span className="font-semibold text-slate-800">{ref.condition}</span></p>}
                                  </div>
                                  <div className="flex flex-col justify-between items-end">
                                    <div className="text-right">
                                      <span className={`px-3 py-1 rounded-full text-xs font-bold ${ref.status === 'Chưa phản hồi' || ref.status === 'Từ chối' ? 'bg-red-100 text-red-700' : ref.status === 'Đã kết nối' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`}>{ref.status}</span>
                                      <p className="text-xs text-slate-400 mt-2">{ref.date}</p>
                                    </div>
                                    <button onClick={() => handleDeleteReferral(idx)} className="text-slate-400 hover:text-red-500 mt-2 p-1"><Trash2 size={18} /></button>
                                  </div>
                                </div>
                               ))}
                               
                               {showAddReferralForm ? (
                                <div className="bg-slate-50 p-6 rounded-2xl border border-indigo-200 mt-4">
                                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                    <div><label className="block text-sm font-bold mb-1">Tổ chức</label><input type="text" value={newRefOrg} onChange={(e)=>setNewRefOrg(e.target.value)} className="w-full p-2 border rounded-lg" /></div>
                                    <div><label className="block text-sm font-bold mb-1">Dịch vụ</label><input type="text" value={newRefService} onChange={(e)=>setNewRefService(e.target.value)} className="w-full p-2 border rounded-lg" /></div>
                                    <div><label className="block text-sm font-bold mb-1">Tình trạng nguồn lực</label><input type="text" value={newRefCondition} onChange={(e)=>setNewRefCondition(e.target.value)} className="w-full p-2 border rounded-lg" placeholder="VD: Đang có sẵn, Thiếu kinh phí..." /></div>
                                    <div>
                                      <label className="block text-sm font-bold mb-1">Trạng thái kết nối</label>
                                      <select value={newRefStatus} onChange={(e)=>setNewRefStatus(e.target.value)} className="w-full p-2 border rounded-lg">
                                        <option value="Đã kết nối">Đã kết nối</option>
                                        <option value="Đang xử lý">Đang xử lý</option>
                                        <option value="Chờ phản hồi">Chờ phản hồi</option>
                                        <option value="Chưa phản hồi">Chưa phản hồi</option>
                                        <option value="Từ chối">Từ chối</option>
                                      </select>
                                    </div>
                                  </div>
                                  <div className="flex justify-end gap-3"><button onClick={()=>setShowAddReferralForm(false)} className="px-5 py-2 font-bold bg-white border rounded-lg">Hủy</button><button onClick={handleSaveNewReferral} className="px-5 py-2 bg-indigo-600 text-white font-bold rounded-lg">Lưu</button></div>
                                </div>
                              ) : (
                                <button onClick={() => setShowAddReferralForm(true)} className="w-full py-4 border-2 border-dashed text-indigo-600 font-bold rounded-2xl mt-4">Kết nối nguồn lực mới</button>
                              )}
                            </div>
                          )}

                          {/* TAB 5: EVALUATION */}
                          {detailSubTab === 'evaluation' && (
                            <div className="animate-in">
                              <div className="flex justify-between items-center mb-8">
                                <h3 className="font-black text-xl">Biểu đồ Lượng giá</h3>
                                {selectedClient.status !== 'Đã đóng ca' ? (
                                  <button onClick={handleCloseCase} className="bg-slate-800 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2"><CheckCircle size={18}/> Đóng ca</button>
                                ) : (
                                  <button onClick={handleReopenCase} className="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2"><RotateCcw size={18}/> Mở lại hồ sơ</button>
                                )}
                              </div>
                              
                              {/* CÁC BIỂU ĐỒ */}
                              {selectedClient.details?.goals?.map(goal => (
                                goal.kpi?.history?.length > 0 && (
                                  <div key={goal.id} className="bg-white border rounded-2xl p-6 shadow-sm mb-6">
                                    <div className="flex justify-between items-center mb-4 border-b pb-3"><h4 className="font-bold flex items-center gap-2"><TrendingDown size={20} className="text-blue-600"/> {goal.text}</h4><span className="text-xs font-bold px-3 py-1 rounded-full bg-blue-100 text-blue-700">Hiện tại: {goal.kpi.current}</span></div>
                                    <MiniLineChart kpiData={goal.kpi} />
                                  </div>
                                )
                              ))}

                              {/* GHI CHÚ LƯỢNG GIÁ TỔNG QUÁT */}
                              <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 mt-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h4 className="font-bold text-slate-800 text-lg flex items-center gap-2"><FileSignature size={20} className="text-emerald-600"/> Ghi chú chuyên môn lượng giá</h4>
                                    {!isEditingEvalNote ? (
                                        <button onClick={() => { setEvalNoteData(selectedClient.details.evaluationNotes || ''); setIsEditingEvalNote(true); }} className="text-sm font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-lg hover:bg-blue-100">Chỉnh sửa ghi chú</button>
                                    ) : (
                                        <div className="flex gap-2">
                                            <button onClick={() => setIsEditingEvalNote(false)} className="text-sm font-bold text-slate-600 bg-slate-100 px-4 py-2 rounded-lg hover:bg-slate-200">Hủy</button>
                                            <button onClick={() => {
                                                updateClientInState({ ...selectedClient, details: { ...selectedClient.details, evaluationNotes: evalNoteData } });
                                                setIsEditingEvalNote(false);
                                                showAlert('Thành công', 'Đã lưu ghi chú lượng giá.', 'success');
                                            }} className="text-sm font-bold text-white bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-700">Lưu Ghi Chú</button>
                                        </div>
                                    )}
                                </div>
                                {!isEditingEvalNote ? (
                                    <p className="text-slate-600 whitespace-pre-wrap leading-relaxed p-4 bg-slate-50 rounded-xl border border-slate-100">{selectedClient.details.evaluationNotes || 'Chưa có ghi chú lượng giá tổng kết.'}</p>
                                ) : (
                                    <textarea rows={5} value={evalNoteData} onChange={e => setEvalNoteData(e.target.value)} className="w-full p-4 border rounded-xl outline-none" placeholder="Nhập nhận xét về sự tiến bộ, điểm cần khắc phục của sinh viên sau quá trình hỗ trợ..."></textarea>
                                )}
                              </div>

                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  )}

                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <CaseManagementDemo />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
